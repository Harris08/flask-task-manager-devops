version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./app/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network

  flask:
    build: .
    container_name: flask-app
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
    depends_on:
      - mysql
    networks:
      - app-network

  apache2:
    image: httpd:2.4
    container_name: apache2
    restart: always
    ports:
      - "80:80"
    depends_on:
      - flask
    networks:
      - app-network
    command: >
      /bin/sh -c "echo 'ServerName localhost' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'LoadModule proxy_module modules/mod_proxy.so' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'LoadModule proxy_http_module modules/mod_proxy_http.so' >> /usr/local/apache2/conf/httpd.conf &&
      echo '<VirtualHost *:80>' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'ProxyPreserveHost On' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'ProxyPass / http://flask:5000/' >> /usr/local/apache2/conf/httpd.conf &&
      echo 'ProxyPassReverse / http://flask:5000/' >> /usr/local/apache2/conf/httpd.conf &&
      echo '</VirtualHost>' >> /usr/local/apache2/conf/httpd.conf &&
      httpd-foreground"

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data: